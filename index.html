<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #dbe8d4;
        }

        button {
            width: 70px;
            height: 40px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            color: whitesmoke;
        }

        .group button.minus {
            width: 50px;
            height: 20px;
        }

        #export_this_bitch {
            background-color: black;
            color: whitesmoke;
            width: 366px;
            margin-bottom: 1em;
        }

        .group {
            display: grid;
            grid-template-columns: repeat(5, 70px);
            gap: 4px;
            margin-bottom: 1em;
            width: max-content;
        }

        .group button {
            justify-self: center;
        }

        .group button.last {
            outline: 3px solid black;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <button id="export_this_bitch">EXPORT TO CSV</button>
    <div id="grid"></div>
    <p id="log"></p>

    <script>
        const colors = ['#8fcf8f', '#8fc4c4', '#e0a86b', '#5e9595', '#c9a983', '#d98a8a', '#9c75b8', '#c9a93a'];
        const ROWS = colors.length;
        const COLS = 5;
        const counts = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

        const grid = document.getElementById('grid');
        const log = document.getElementById('log');
        let lastBtn = null;

        function update(r, c, delta, btn) {
            counts[r][c] += delta;
            document.getElementById(`cell-${r}-${c}`).textContent = counts[r][c];
            if (lastBtn) lastBtn.classList.remove('last');
            btn.classList.add('last');
            lastBtn = btn;
            const sign = delta > 0 ? '+' : '-';
            log.innerHTML = `${sign}${(r + 1) * 10 + (c + 1)}<br>` + log.innerHTML;
        }

        for (let r = 0; r < ROWS; r++) {
            const group = document.createElement('div');
            group.className = 'group';
            for (let c = 0; c < COLS; c++) {
                const plus = document.createElement('button');
                plus.id = `cell-${r}-${c}`;
                plus.style.backgroundColor = colors[r];
                plus.textContent = '0';
                plus.onclick = () => update(r, c, 1, plus);
                group.appendChild(plus);
            }
            for (let c = 0; c < COLS; c++) {
                const minus = document.createElement('button');
                minus.className = 'minus';
                minus.style.backgroundColor = colors[r];
                minus.textContent = `- ${c + 1}`;
                minus.onclick = () => update(r, c, -1, minus);
                group.appendChild(minus);
            }
            grid.appendChild(group);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;padding:0;border:none;background:transparent;color:transparent';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
                document.execCommand('copy');
            } catch (e) { }
            document.body.removeChild(ta);
        }

        document.getElementById('export_this_bitch').onclick = () => {
            const csv = counts.map(row => row.join(',')).join('\n');
            log.innerHTML = csv.replace(/\n/g, '<br>') + '<br>' + log.innerHTML;
            copyToClipboard(csv);
        };
    </script>
</body>

</html>
